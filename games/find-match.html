<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Find the Match</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#1C1C1E;--lime:#C8E632}
body{font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;background:#F5F0E8;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
.back{align-self:flex-start;color:var(--accent);font-weight:700;text-decoration:none;margin-bottom:16px;font-size:.9rem}
h1{font-size:1.7rem;font-weight:800;color:var(--accent);margin-bottom:4px}
.subtitle{color:#aaa;font-size:.9rem;margin-bottom:20px;text-align:center}
.card{background:#fff;border-radius:20px;padding:24px 18px;box-shadow:0 4px 24px #C8E63218;width:100%;max-width:520px;text-align:center}
.top{display:flex;justify-content:space-between;margin-bottom:16px;font-weight:700;color:#888;font-size:.9rem}
.top span{color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.tile{aspect-ratio:1;border-radius:12px;background:#FBF8F3;border:2px solid #eee2d8;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.78rem;color:var(--accent);cursor:pointer;text-align:center;padding:6px;line-height:1.2;transition:.15s}
.tile:hover{border-color:var(--lime)}
.tile.selected{background:rgba(200,230,50,0.25);border-color:var(--accent)}
.tile.matched{visibility:hidden}
.tile.wrong-flash{background:#fce4ec;border-color:#f44336}
.feedback{margin-top:18px;font-size:.95rem;font-weight:700;min-height:22px;color:#888}
.play-again{margin-top:12px;padding:14px 24px;border:none;border-radius:14px;font-family:inherit;font-weight:800;font-size:1rem;cursor:pointer;background:var(--accent);color:#fff;display:none}
@media (max-width:420px){.grid{grid-template-columns:repeat(3,1fr)}.tile{font-size:.7rem}}
</style>
<link rel="stylesheet" href="../styles/mobile-guard.css?v=184">
</head>
<body>
<a class="back" href="index.html">← Games</a>
<h1>🟩 Find the Match</h1>
<p class="subtitle" id="topicLabel">Click two tiles that match — word and translation</p>
<div class="card">
  <div class="top"><div>Pairs left: <span id="left">0</span></div><div>⏱ <span id="time">90</span>s</div></div>
  <div class="grid" id="grid"></div>
  <div class="feedback" id="feedback"></div>
  <button class="play-again" id="again" onclick="start()">▶ Play Again</button>
</div>

<script src="../scripts/vocabulary.js?v=184"></script>
<script src="../scripts/custom-sets.js?v=184"></script>
<script>
let tiles=[], selected=[], pairsLeft=0, timer=90, sInt;

function shuffle(a){return a.slice().sort(()=>Math.random()-.5)}

function loadWords(){
  const p=new URLSearchParams(location.search);
  const setId=p.get('set');
  if(setId && window.TEACHEDOS_CUSTOM){
    const set=TEACHEDOS_CUSTOM.get(setId);
    if(set && set.words.length>=4){
      document.getElementById('topicLabel').textContent=(set.icon||'📚')+' '+set.name+' — match each word to its translation';
      return shuffle(set.words).slice(0,8);
    }
  }
  let topicId=p.get('topic');
  const level=p.get('level')||'mix';
  const V=window.TEACHEDOS_VOCAB;
  if(!V) return [];
  if(!topicId || !V.getTopic(topicId)){
    const ids=V.ids();
    topicId=ids[Math.floor(Math.random()*ids.length)];
  }
  const topic=V.getTopic(topicId);
  document.getElementById('topicLabel').textContent=topic.icon+' '+topic.name+' — match each word to its translation';
  let words=V.getWords(topicId, level);
  if(words.length<8) words=V.getWords(topicId,'mix');
  return shuffle(words).slice(0,8);
}

function start(){
  document.getElementById('again').style.display='none';
  document.getElementById('feedback').textContent='';
  selected=[];
  timer=90;
  document.getElementById('time').textContent=90;

  const words=loadWords().filter(w=>w.uk||w.ru);
  tiles=[];
  words.forEach((w,i)=>{
    tiles.push({id:'a'+i, text:w.en, pair:i, matched:false});
    tiles.push({id:'b'+i, text:w.uk||w.ru, pair:i, matched:false});
  });
  tiles=shuffle(tiles);
  pairsLeft=words.length;
  document.getElementById('left').textContent=pairsLeft;

  render();
  clearInterval(sInt);
  sInt=setInterval(()=>{
    timer--;
    document.getElementById('time').textContent=timer;
    if(timer<=0) endGame(false);
  },1000);
}

function render(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  tiles.forEach((t,i)=>{
    const el=document.createElement('div');
    el.className='tile'+(t.matched?' matched':'');
    el.textContent=t.text;
    el.onclick=()=>clickTile(i,el);
    grid.appendChild(el);
  });
}

function clickTile(i,el){
  const t=tiles[i];
  if(t.matched || selected.find(s=>s.i===i)) return;
  el.classList.add('selected');
  selected.push({i,el,t});
  if(selected.length<2) return;

  const [first,second]=selected;
  if(first.t.pair===second.t.pair && first.t.id!==second.t.id){
    first.t.matched=true; second.t.matched=true;
    first.el.classList.add('matched'); second.el.classList.add('matched');
    pairsLeft--;
    document.getElementById('left').textContent=pairsLeft;
    document.getElementById('feedback').textContent='✓ '+first.t.text+' = '+second.t.text;
    if(pairsLeft<=0) endGame(true);
  } else {
    first.el.classList.add('wrong-flash'); second.el.classList.add('wrong-flash');
    document.getElementById('feedback').textContent='✗ Not a match — try again';
    setTimeout(()=>{
      first.el.classList.remove('selected','wrong-flash');
      second.el.classList.remove('selected','wrong-flash');
    },500);
  }
  selected=[];
  window.parent.postMessage({type:'teachedos-score',score:8-pairsLeft},'*');
}

function endGame(won){
  clearInterval(sInt);
  document.getElementById('feedback').textContent= won ? '🎉 All pairs matched!' : '⏱ Time up! '+(8-pairsLeft)+'/8 pairs found';
  document.getElementById('again').style.display='inline-block';
}

start();
</script>
<script src="../scripts/mobile-zoom-guard.js?v=184"></script>
</body>
</html>
