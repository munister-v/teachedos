<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Image Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#1C1C1E;--lime:#C8E632}
body{font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;background:#F5F0E8;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
.back{align-self:flex-start;color:var(--accent);font-weight:700;text-decoration:none;margin-bottom:16px;font-size:.9rem}
h1{font-size:1.7rem;font-weight:800;color:var(--accent);margin-bottom:4px}
.subtitle{color:#aaa;font-size:.9rem;margin-bottom:20px;text-align:center}
.card{background:#fff;border-radius:20px;padding:24px 20px;box-shadow:0 4px 24px #C8E63218;width:100%;max-width:460px;text-align:center}
.top{display:flex;justify-content:space-between;margin-bottom:14px;font-weight:700;color:#888;font-size:.9rem}
.top span{color:var(--accent)}
.progress{width:100%;height:6px;background:#f0e0e8;border-radius:3px;margin-bottom:18px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:.3s}
.prompt{font-size:1.2rem;font-weight:800;color:var(--accent);min-height:60px;display:flex;align-items:center;justify-content:center;line-height:1.4;margin-bottom:18px}
.prompt img{max-width:100%;max-height:180px;border-radius:14px;object-fit:cover}
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.opt{border:none;border-radius:16px;cursor:pointer;padding:18px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;transition:.15s;border:2px solid transparent}
.opt:hover{transform:translateY(-2px)}
.opt .icon{font-size:2.2rem}
.opt .label{font-weight:800;font-size:.95rem;color:var(--accent)}
.opt.correct-flash{border-color:#4caf50;background:#e8f5e9 !important}
.opt.wrong-flash{border-color:#f44336;background:#fce4ec !important}
.feedback{margin-top:18px;font-size:.9rem;font-weight:700;min-height:40px;color:#888;line-height:1.4}
.play-again{margin-top:12px;padding:14px 24px;border:none;border-radius:14px;font-family:inherit;font-weight:800;font-size:1rem;cursor:pointer;background:var(--accent);color:#fff;display:none}
</style>
<link rel="stylesheet" href="../styles/mobile-guard.css?v=170">
</head>
<body>
<a class="back" href="index.html">← Games</a>
<h1>🖼️ Image Quiz</h1>
<p class="subtitle" id="topicLabel">Pick the word that matches the meaning</p>
<div class="card">
  <div class="top"><div>Score: <span id="score">0</span></div><div>Q: <span id="qn">1</span>/<span id="qt">10</span></div></div>
  <div class="progress"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div class="prompt" id="prompt"></div>
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"></div>
  <button class="play-again" id="again" onclick="start()">▶ Play Again</button>
</div>

<script src="../scripts/vocabulary.js?v=170"></script>
<script src="../scripts/custom-sets.js?v=170"></script>
<script>
let words=[], questions=[], idx=0, score=0, topicMeta=null;

function shuffle(a){return a.slice().sort(()=>Math.random()-.5)}

function loadWords(){
  const p=new URLSearchParams(location.search);
  const setId=p.get('set');
  if(setId && window.TEACHEDOS_CUSTOM){
    const set=TEACHEDOS_CUSTOM.get(setId);
    if(set && set.words.length>=4){
      words=set.words;
      topicMeta={name:set.name, icon:set.icon||'📚', color:'#C8E632'};
      return true;
    }
  }
  let topicId=p.get('topic');
  const level=p.get('level')||'mix';
  const V=window.TEACHEDOS_VOCAB;
  if(!V) return false;
  if(!topicId || !V.getTopic(topicId)){
    const ids=V.ids();
    topicId=ids[Math.floor(Math.random()*ids.length)];
  }
  topicMeta=V.getTopic(topicId);
  words=V.getWords(topicId, level);
  if(words.length<4){
    words=V.getWords(topicId,'mix');
  }
  return words.length>=4;
}

function buildQuestions(){
  const pool=shuffle(words);
  const n=Math.min(10, pool.length);
  questions=pool.slice(0,n).map(w=>{
    const distractors=shuffle(words.filter(x=>x.en!==w.en)).slice(0,3);
    const opts=shuffle([w, ...distractors]);
    return {answer:w, opts, prompt:w.uk + (w.ru?' / '+w.ru:''), img: w.img||''};
  });
}

function start(){
  if(!loadWords()){
    document.getElementById('prompt').textContent='Vocabulary library not available.';
    return;
  }
  document.getElementById('topicLabel').textContent = topicMeta.icon+' '+topicMeta.name+' — pick the matching word';
  buildQuestions();
  idx=0; score=0;
  document.getElementById('score').textContent=0;
  document.getElementById('qt').textContent=questions.length;
  document.getElementById('again').style.display='none';
  document.getElementById('feedback').textContent='';
  nextQ();
}

function nextQ(){
  if(idx>=questions.length){ endGame(); return; }
  const q=questions[idx];
  document.getElementById('qn').textContent=idx+1;
  document.getElementById('prog').style.width=((idx/questions.length)*100)+'%';
  const promptEl=document.getElementById('prompt');
  if(q.img){
    const img=document.createElement('img');
    img.src=q.img;
    img.alt='';
    img.onerror=()=>{ promptEl.textContent='“'+q.prompt+'”'; };
    promptEl.innerHTML='';
    promptEl.appendChild(img);
  } else {
    promptEl.textContent='“'+q.prompt+'”';
  }
  document.getElementById('feedback').textContent='';
  const optsWrap=document.getElementById('options');
  optsWrap.innerHTML='';
  q.opts.forEach(o=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.style.background=topicMeta.color+'33';
    if(q.img){
      btn.innerHTML=`<span class="label">${o.en}</span>`;
    } else {
      btn.innerHTML=`<span class="icon">${topicMeta.icon}</span><span class="label">${o.en}</span>`;
    }
    btn.onclick=()=>answer(o,btn);
    optsWrap.appendChild(btn);
  });
}

function answer(opt,btn){
  const q=questions[idx];
  const ok=opt.en===q.answer.en;
  if(ok){
    score++;
    btn.classList.add('correct-flash');
    document.getElementById('feedback').textContent='✓ '+q.answer.en+' — '+q.answer.ex;
  } else {
    btn.classList.add('wrong-flash');
    [...document.querySelectorAll('.opt')].forEach(b=>{
      if(b.textContent.includes(q.answer.en)) b.classList.add('correct-flash');
    });
    document.getElementById('feedback').textContent='✗ Correct: '+q.answer.en+' — '+q.answer.ex;
  }
  document.getElementById('score').textContent=score;
  window.parent.postMessage({type:'teachedos-score',score:score},'*');
  [...document.querySelectorAll('.opt')].forEach(b=>b.onclick=null);
  idx++;
  setTimeout(nextQ,1400);
}

function endGame(){
  document.getElementById('prog').style.width='100%';
  document.getElementById('prompt').textContent='Game over!';
  document.getElementById('options').innerHTML='';
  document.getElementById('feedback').textContent='Final score: '+score+'/'+questions.length;
  document.getElementById('again').style.display='inline-block';
}

start();
</script>
<script src="../scripts/mobile-zoom-guard.js?v=170"></script>
</body>
</html>
