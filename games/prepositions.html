<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Prepositions</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#1C1C1E}
body{font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;background:#F5F0E8;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
.back{align-self:flex-start;color:var(--accent);font-weight:700;text-decoration:none;margin-bottom:16px;font-size:.9rem}
h1{font-size:1.7rem;font-weight:800;color:var(--accent);margin-bottom:4px}
.subtitle{color:#aaa;font-size:.9rem;margin-bottom:20px}
.card{background:#fff;border-radius:20px;padding:28px 20px;box-shadow:0 4px 24px #C8E63218;width:100%;max-width:460px;text-align:center}
.top{display:flex;justify-content:space-between;margin-bottom:20px;font-weight:700;color:#888;font-size:.9rem}
.top span{color:var(--accent)}
.sentence{font-size:1.2rem;font-weight:700;color:#333;min-height:60px;display:flex;align-items:center;justify-content:center;line-height:1.6;margin-bottom:20px}
.blank{color:var(--accent);font-size:1.5rem;border-bottom:3px solid var(--accent);padding:0 6px;min-width:40px;display:inline-block}
.choices{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.choice{padding:12px 6px;border:2.5px solid #eee;border-radius:12px;font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;font-weight:800;font-size:1rem;cursor:pointer;background:#fff;transition:.15s;color:#555}
.choice:hover{border-color:var(--accent);color:var(--accent)}
.choice.correct{border-color:#4caf50;background:#f0fff4;color:#2e7d32}
.choice.wrong{border-color:#f44336;background:#fff0f0;color:#c62828}
.feedback{margin-top:14px;font-size:.9rem;font-weight:700;min-height:20px;color:#888}
.progress{width:100%;height:5px;background:#f0e0e8;border-radius:3px;margin-bottom:20px}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:.3s}
</style>
</head>
<body>
<a class="back" href="index.html">← Games</a>
<h1>📍 Prepositions</h1>
<p class="subtitle">at / in / on / by — choose wisely</p>
<div class="card">
  <div class="top"><div>Score: <span id="score">0</span></div><div>Q: <span id="qn">1</span>/20</div></div>
  <div class="progress"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div class="sentence" id="sentence"></div>
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
</div>
<script>
const QS=[
  {s:'She was born ___ 1998.',a:'in',opts:['at','in','on','by'],exp:'Years → in'},
  {s:'The meeting is ___ Monday.',a:'on',opts:['at','in','on','by'],exp:'Days → on'},
  {s:'He arrived ___ midnight.',a:'at',opts:['at','in','on','by'],exp:'Specific times → at'},
  {s:'Please finish ___ Friday.',a:'by',opts:['at','in','on','by'],exp:'Deadline → by'},
  {s:'She lives ___ Paris.',a:'in',opts:['at','in','on','by'],exp:'Cities → in'},
  {s:'The keys are ___ the table.',a:'on',opts:['at','in','on','by'],exp:'Surface → on'},
  {s:'We met ___ the airport.',a:'at',opts:['at','in','on','by'],exp:'Specific places → at'},
  {s:'He travels ___ train.',a:'by',opts:['at','in','on','by'],exp:'Transport → by'},
  {s:'I woke up ___ 7 o\'clock.',a:'at',opts:['at','in','on','by'],exp:'Clock times → at'},
  {s:'The book is ___ the shelf.',a:'on',opts:['at','in','on','by'],exp:'Surface/position → on'},
  {s:'She is good ___ mathematics.',a:'at',opts:['at','in','on','by'],exp:'good at + skill'},
  {s:'We\'ll see you ___ the evening.',a:'in',opts:['at','in','on','by'],exp:'Parts of day → in (except "at night")'},
  {s:'The train leaves ___ platform 3.',a:'at',opts:['at','in','on','by'],exp:'Platforms, stops → at'},
  {s:'She paid ___ credit card.',a:'by',opts:['at','in','on','by'],exp:'Payment method → by'},
  {s:'He is ___ the phone right now.',a:'on',opts:['at','in','on','by'],exp:'on the phone'},
  {s:'The concert is ___ Christmas Eve.',a:'on',opts:['at','in','on','by'],exp:'Specific dates/occasions → on'},
  {s:'I\'ll be there ___ an hour.',a:'in',opts:['at','in','on','by'],exp:'Duration from now → in'},
  {s:'She sat ___ the window.',a:'by',opts:['at','in','on','by'],exp:'Next to → by'},
  {s:'He learned English ___ watching films.',a:'by',opts:['at','in','on','by'],exp:'Method/means → by'},
  {s:'The shop is ___ the corner.',a:'on',opts:['at','in','on','by'],exp:'on the corner'},
];
let q=[],idx=0,score=0,locked=false;
function shuffle(a){return a.sort(()=>Math.random()-.5)}
function start(){q=shuffle([...QS]).slice(0,20);idx=0;score=0;document.getElementById('score').textContent=0;nextQ();}
function nextQ(){
  if(idx>=q.length){endGame();return;}
  locked=false;
  const item=q[idx];
  document.getElementById('sentence').innerHTML=item.s.replace('___','<span class="blank">___</span>');
  document.getElementById('qn').textContent=idx+1;
  document.getElementById('prog').style.width=((idx/q.length)*100)+'%';
  document.getElementById('feedback').textContent='';
  const ch=document.getElementById('choices');
  ch.innerHTML='';
  item.opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='choice';btn.textContent=opt;
    btn.onclick=()=>pick(opt,btn,item.a,item.exp);
    ch.appendChild(btn);
  });
}
function pick(opt,btn,correct,exp){
  if(locked)return;locked=true;
  const ok=opt===correct;
  btn.classList.add(ok?'correct':'wrong');
  if(!ok)[...document.getElementById('choices').children].forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});
  if(ok){score++;document.getElementById('score').textContent=score;
    window.parent.postMessage({type:'teachedos-score',score:score},'*');}
  document.getElementById('feedback').textContent=(ok?'✓ ':'✗ ')+exp;
  idx++;setTimeout(nextQ,1000);
}
function endGame(){
  document.getElementById('sentence').textContent='Done!';
  document.getElementById('choices').innerHTML=`<button onclick="start()" style="grid-column:span 4;padding:12px;border:none;border-radius:12px;font-family:inherit;font-weight:800;font-size:1rem;cursor:pointer;background:var(--accent);color:#fff">▶ Play Again</button>`;
  document.getElementById('feedback').textContent='Score: '+score+'/'+q.length;
}
start();
</script>
</body>
</html>
