<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Synonym Snap</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#1C1C1E}
body{font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;background:#F5F0E8;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
.back{align-self:flex-start;color:var(--accent);font-weight:700;text-decoration:none;margin-bottom:16px;font-size:.9rem}
h1{font-size:1.7rem;font-weight:800;color:var(--accent);margin-bottom:4px}
.subtitle{color:#aaa;font-size:.9rem;margin-bottom:20px}
.hud{display:flex;gap:24px;margin-bottom:14px;font-weight:700;color:#888;font-size:.95rem}
.hud span{color:var(--accent)}
.timer-bar{width:100%;max-width:500px;height:8px;background:#f0e0e8;border-radius:4px;margin-bottom:16px;overflow:hidden}
.timer-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .1s linear}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:500px}
.word-card{padding:14px 6px;background:#fff;border:2.5px solid #eee;border-radius:14px;font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;transition:.15s;text-align:center;color:#444;min-height:52px;display:flex;align-items:center;justify-content:center;line-height:1.3}
.word-card:hover{border-color:var(--accent)}
.word-card.selected{border-color:var(--accent);background:#F5F0E8;color:var(--accent)}
.word-card.matched{border-color:#4caf50;background:#f0fff4;color:#2e7d32;cursor:default}
.word-card.wrong{border-color:#f44336;background:#fff0f0}
.msg{margin-top:14px;font-size:1rem;font-weight:700;color:var(--accent);min-height:22px;text-align:center}
</style>
<link rel="stylesheet" href="../styles/mobile-guard.css">
</head>
<body>
<a class="back" href="index.html">← Games</a>
<h1>🔄 Synonym Snap</h1>
<p class="subtitle">Match synonym pairs — tap two cards</p>
<div class="hud"><div>Pairs: <span id="pairs">0</span>/8</div><div>Errors: <span id="errors">0</span></div><div>⏱ <span id="time">90</span>s</div></div>
<div class="timer-bar"><div class="timer-fill" id="tfill" style="width:100%"></div></div>
<div class="grid" id="grid"></div>
<div class="msg" id="msg"></div>

<script>
const PAIRS=[
  ['big','large'],['fast','quick'],['happy','glad'],['begin','start'],
  ['angry','furious'],['smart','clever'],['tired','exhausted'],['strange','odd'],
  ['help','assist'],['buy','purchase'],['end','finish'],['brave','courageous'],
  ['old','ancient'],['simple','easy'],['dark','gloomy'],['rich','wealthy'],
  ['loud','noisy'],['sad','miserable'],['pretty','beautiful'],['scared','afraid'],
];
let selected=[],matched=0,errors=0,timer=90,tInt,locked=false;

function shuffle(a){return a.sort(()=>Math.random()-.5)}

function start(){
  matched=0;errors=0;timer=90;selected=[];locked=false;
  document.getElementById('pairs').textContent=0;
  document.getElementById('errors').textContent=0;
  document.getElementById('time').textContent=90;
  document.getElementById('tfill').style.width='100%';
  document.getElementById('msg').textContent='';
  clearInterval(tInt);
  tInt=setInterval(()=>{
    timer--;
    document.getElementById('time').textContent=timer;
    document.getElementById('tfill').style.width=(timer/90*100)+'%';
    if(timer<=0){clearInterval(tInt);endGame();}
  },1000);

  const chosen=shuffle([...PAIRS]).slice(0,8);
  const cards=[];
  chosen.forEach(([a,b])=>{cards.push({word:a,group:a+'|'+b});cards.push({word:b,group:a+'|'+b});});
  shuffle(cards);

  const grid=document.getElementById('grid');
  grid.innerHTML='';
  cards.forEach(c=>{
    const div=document.createElement('div');
    div.className='word-card';
    div.textContent=c.word;
    div.dataset.group=c.group;
    div.onclick=()=>pick(div);
    grid.appendChild(div);
  });
}

function pick(div){
  if(locked||div.classList.contains('matched')||div.classList.contains('selected'))return;
  div.classList.add('selected');
  selected.push(div);
  if(selected.length===2){
    locked=true;
    setTimeout(check,400);
  }
}

function check(){
  const [a,b]=selected;
  if(a.dataset.group===b.dataset.group){
    a.classList.remove('selected');b.classList.remove('selected');
    a.classList.add('matched');b.classList.add('matched');
    matched++;
    document.getElementById('pairs').textContent=matched;
    if(matched===8){clearInterval(tInt);document.getElementById('msg').innerHTML=`🎉 Done! Errors: ${errors} | Time: ${90-timer}s <button onclick="start()" style="margin-left:10px;padding:5px 14px;border:none;border-radius:10px;font-family:inherit;font-weight:700;cursor:pointer;background:var(--accent);color:#fff">▶ Again</button>`;}
  } else {
    errors++;
    document.getElementById('errors').textContent=errors;
    a.classList.add('wrong');b.classList.add('wrong');
    setTimeout(()=>{a.classList.remove('selected','wrong');b.classList.remove('selected','wrong');},600);
  }
  selected=[];locked=false;
}

function endGame(){
  if(matched<8){
    document.getElementById('msg').innerHTML=`Time up! ${matched}/8 pairs <button onclick="start()" style="margin-left:10px;padding:5px 14px;border:none;border-radius:10px;font-family:inherit;font-weight:700;cursor:pointer;background:var(--accent);color:#fff">▶ Again</button>`;
    document.getElementById('grid').querySelectorAll('.word-card:not(.matched)').forEach(c=>c.onclick=null);
  }
}
start();
</script>
<script src="../scripts/mobile-zoom-guard.js"></script>
</body>
</html>
