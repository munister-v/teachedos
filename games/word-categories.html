<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Word Categories</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#E85D75}
body{font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;background:#F5F0E8;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 12px}
.back{align-self:flex-start;color:var(--accent);font-weight:700;text-decoration:none;margin-bottom:14px;font-size:.9rem}
h1{font-size:1.6rem;font-weight:800;color:var(--accent);margin-bottom:3px}
.subtitle{color:#aaa;font-size:.88rem;margin-bottom:16px}
.hud{display:flex;gap:20px;margin-bottom:12px;font-weight:700;color:#888;font-size:.9rem}
.hud span{color:var(--accent)}
.word-pool{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:540px;min-height:60px;margin-bottom:18px}
.chip{padding:9px 16px;background:#E85D75;color:#fff;border-radius:20px;font-weight:800;font-size:.9rem;cursor:pointer;transition:.2s;user-select:none}
.chip:hover{background:#e03570;transform:scale(1.05)}
.chip.used{opacity:.3;cursor:default;transform:none}
.columns{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:540px}
.column{background:#fff;border-radius:16px;padding:14px 12px;box-shadow:0 3px 14px #E85D7514;min-height:140px}
.col-title{font-size:.85rem;font-weight:800;color:var(--accent);margin-bottom:10px;text-align:center;text-transform:uppercase;letter-spacing:.5px}
.drop-area{min-height:100px;display:flex;flex-direction:column;gap:6px}
.placed{padding:7px 12px;background:#F5F0E8;border:2px solid #ffcce0;border-radius:10px;font-weight:700;font-size:.85rem;color:#E85D75;cursor:pointer;text-align:center}
.placed:hover{background:#ffe0ec}
.placed.correct{background:#f0fff4;border-color:#4caf50;color:#2e7d32}
.placed.wrong{background:#fff0f0;border-color:#f44336;color:#c62828}
.btn-row{display:flex;gap:10px;margin-top:14px;width:100%;max-width:540px}
button{flex:1;padding:11px;border:none;border-radius:12px;font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:.15s}
.btn-check{background:var(--accent);color:#fff}
.btn-next{background:#4caf50;color:#fff;display:none}
.btn-clear{background:#f5f5f5;color:#999}
.feedback{margin-top:12px;font-size:.95rem;font-weight:700;color:var(--accent);text-align:center;min-height:20px}
</style>
</head>
<body>
<a class="back" href="index.html">← Games</a>
<h1>🗂️ Word Categories</h1>
<p class="subtitle">Tap a word, then tap a category to place it</p>
<div class="hud"><div>Score: <span id="score">0</span></div><div>Round: <span id="round">1</span>/8</div></div>
<div class="word-pool" id="pool"></div>
<div class="columns" id="columns"></div>
<div class="btn-row">
  <button class="btn-clear" onclick="clearPlacements()">✕ Clear</button>
  <button class="btn-check" id="btn-check" onclick="checkRound()">✓ Check</button>
  <button class="btn-next" id="btn-next" onclick="nextRound()">Next →</button>
</div>
<div class="feedback" id="feedback"></div>

<script>
const ROUNDS=[
  {cats:['🍎 Fruit','🥦 Vegetable'],words:{
    '🍎 Fruit':['apple','mango','grape','plum','peach'],
    '🥦 Vegetable':['carrot','onion','spinach','celery','turnip']
  }},
  {cats:['🐾 Mammal','🐦 Bird'],words:{
    '🐾 Mammal':['dolphin','tiger','rabbit','gorilla','hedgehog'],
    '🐦 Bird':['eagle','parrot','penguin','sparrow','flamingo']
  }},
  {cats:['🌍 Country','🏙️ City'],words:{
    '🌍 Country':['Brazil','Sweden','Nigeria','Vietnam','Poland'],
    '🏙️ City':['Kyoto','Lisbon','Sydney','Prague','Dubai']
  }},
  {cats:['😊 Positive adj.','😞 Negative adj.'],words:{
    '😊 Positive adj.':['brilliant','generous','peaceful','vibrant','cheerful'],
    '😞 Negative adj.':['gloomy','hostile','reckless','bitter','arrogant']
  }},
  {cats:['🏠 Indoor','🌳 Outdoor'],words:{
    '🏠 Indoor':['sofa','wardrobe','microwave','bathtub','bookshelf'],
    '🌳 Outdoor':['bench','fountain','pavement','hedge','lamppost']
  }},
  {cats:['📚 Noun','🏃 Verb'],words:{
    '📚 Noun':['freedom','journey','laughter','courage','wisdom'],
    '🏃 Verb':['achieve','wander','struggle','inspire','negotiate']
  }},
  {cats:['🇺🇸 AmE only','🇬🇧 BrE only'],words:{
    '🇺🇸 AmE only':['elevator','apartment','faucet','cookie','sidewalk'],
    '🇬🇧 BrE only':['lift','flat','tap','biscuit','pavement']
  }},
  {cats:['📈 Formal','😎 Informal'],words:{
    '📈 Formal':['commence','endeavour','obtain','terminate','reside'],
    '😎 Informal':['kick off','try hard','get','stop','live']
  }},
];

let rounds=[],roundIdx=0,score=0,selected=null,placements={};

function shuffle(a){return a.sort(()=>Math.random()-.5)}

function start(){
  rounds=shuffle([...ROUNDS]);
  roundIdx=0;score=0;
  document.getElementById('score').textContent=0;
  loadRound();
}

function loadRound(){
  if(roundIdx>=rounds.length){endGame();return;}
  placements={};selected=null;
  document.getElementById('feedback').textContent='';
  document.getElementById('btn-check').style.display='';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('round').textContent=roundIdx+1;
  const round=rounds[roundIdx];
  const allWords=Object.values(round.words).flat();
  shuffle(allWords);

  const pool=document.getElementById('pool');
  pool.innerHTML='';
  allWords.forEach(w=>{
    const chip=document.createElement('div');
    chip.className='chip';chip.textContent=w;chip.dataset.word=w;
    chip.onclick=()=>selectWord(chip);
    pool.appendChild(chip);
  });

  const cols=document.getElementById('columns');
  cols.innerHTML='';
  round.cats.forEach(cat=>{
    placements[cat]=[];
    const col=document.createElement('div');
    col.className='column';
    col.innerHTML=`<div class="col-title">${cat}</div><div class="drop-area" id="drop-${cat}"></div>`;
    col.onclick=()=>dropWord(cat);
    cols.appendChild(col);
  });
}

function selectWord(chip){
  document.querySelectorAll('.chip').forEach(c=>c.style.outline='');
  if(chip.classList.contains('used'))return;
  selected=chip.dataset.word;
  chip.style.outline='3px solid #333';
}

function dropWord(cat){
  if(!selected)return;
  const chip=document.querySelector(`.chip[data-word="${selected}"]`);
  if(!chip||chip.classList.contains('used'))return;
  chip.classList.add('used');chip.style.outline='';
  placements[cat].push(selected);
  selected=null;
  renderDrops();
}

function renderDrops(showResult=false){
  const round=rounds[roundIdx];
  round.cats.forEach(cat=>{
    const area=document.getElementById('drop-'+cat);
    if(!area)return;
    area.innerHTML='';
    placements[cat].forEach(w=>{
      const div=document.createElement('div');
      div.className='placed';
      div.textContent=w;
      if(showResult){
        const correct=round.words[cat].includes(w);
        div.classList.add(correct?'correct':'wrong');
      } else {
        div.onclick=()=>returnWord(w,cat);
      }
      area.appendChild(div);
    });
  });
}

function returnWord(word,cat){
  placements[cat]=placements[cat].filter(w=>w!==word);
  const chip=document.querySelector(`.chip[data-word="${word}"]`);
  if(chip){chip.classList.remove('used');chip.style.outline='';}
  renderDrops();
}

function clearPlacements(){
  const round=rounds[roundIdx];
  round.cats.forEach(cat=>{placements[cat]=[];});
  document.querySelectorAll('.chip').forEach(c=>{c.classList.remove('used');c.style.outline='';});
  renderDrops();selected=null;
}

function checkRound(){
  const round=rounds[roundIdx];
  let correct=0,total=0;
  round.cats.forEach(cat=>{
    placements[cat].forEach(w=>{
      total++;
      if(round.words[cat].includes(w))correct++;
    });
  });
  const allPlaced=Object.values(placements).reduce((s,a)=>s+a.length,0)===10;
  if(!allPlaced){document.getElementById('feedback').textContent='Place all 10 words first!';return;}
  score+=correct;
  document.getElementById('score').textContent=score;
    window.parent.postMessage({type:'teachedos-score',score:score},'*');
  document.getElementById('feedback').textContent=`${correct}/10 correct`;
  document.getElementById('btn-check').style.display='none';
  document.getElementById('btn-next').style.display='';
  document.getElementById('btn-clear').style.display='none';
  renderDrops(true);
}

function nextRound(){
  roundIdx++;
  document.getElementById('btn-clear').style.display='';
  loadRound();
}

function endGame(){
  document.getElementById('pool').innerHTML='';
  document.getElementById('columns').innerHTML='';
  document.querySelector('.btn-row').innerHTML=`<button onclick="start()" style="flex:1;padding:11px;border:none;border-radius:12px;font-family:inherit;font-weight:700;font-size:.95rem;cursor:pointer;background:var(--accent);color:#fff">▶ Play Again</button>`;
  document.getElementById('feedback').textContent='Total score: '+score+'/80';
}

start();
</script>
</body>
</html>
