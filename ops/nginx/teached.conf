server {
    server_name teached.tech www.teached.tech 173.242.49.73 _;

    root /var/www/teached;
    index index.html;
    client_max_body_size 30m;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # Brotli: ~15-20% smaller than gzip on text assets; static serves
    # pre-eligible files, dynamic compresses on the fly. Falls back to
    # gzip for clients that don't advertise br.
    brotli on;
    brotli_comp_level 6;
    brotli_min_length 1024;
    brotli_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    location = /health {
        proxy_pass http://127.0.0.1:4000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://127.0.0.1:4000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|ico|svg|woff2?)$ {
        # Single Cache-Control source (was previously doubled by `expires`
        # + add_header both emitting one). 30 days, public.
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    http2 on; # multiplex all CSS/JS/img over one connection (was HTTP/1.1: ~6-conn cap, head-of-line queueing)
    ssl_certificate /etc/letsencrypt/live/teached.tech/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/teached.tech/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.teached.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = teached.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80 default_server;
    listen [::]:80 default_server;
    server_name teached.tech www.teached.tech 173.242.49.73 _;
    return 404; # managed by Certbot




}
