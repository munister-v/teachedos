<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student Portal - TeachEd</title>
<link rel="stylesheet" href="dark.css">
<script src="theme.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F0E8;--accent:#1C1C1E;--text:#1C1C1E;--text-2:#3A3A2E;--text-3:#A2A28C;
  --border:rgba(94,94,74,.14);--card:#fff;--font:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Helvetica Neue',Arial,sans-serif;--mono:'SFMono-Regular', 'SF Mono', ui-monospace, Menlo, Monaco, Consolas, monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
#nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;height:52px;gap:12px;box-shadow:0 1px 12px rgba(200,230,50,.07)}
.nav-logo{font-size:15px;font-weight:900;color:var(--text);letter-spacing:-.03em;text-decoration:none}
.nav-logo em{color:var(--accent);font-style:normal}
.nav-spacer{flex:1}
.nav-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;color:var(--text-2);text-decoration:none;transition:.15s}
.nav-btn:hover{background:rgba(200,230,50,.08);border-color:rgba(200,230,50,.3);color:var(--accent)}
#main{max-width:900px;margin:0 auto;padding:32px 20px 60px}
.hero{background:linear-gradient(135deg,rgba(200,230,50,.07),rgba(94,94,74,.04));border:1.5px solid var(--border);border-radius:20px;padding:28px;display:flex;align-items:center;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.hero-avatar{font-size:3.5rem;line-height:1;flex-shrink:0}
.hero-name{font-size:24px;font-weight:900;color:var(--text);letter-spacing:-.03em}
.hero-email{font-size:13px;color:var(--text-3);margin-top:4px}
.hero-spacer{flex:1}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:16px;text-align:center}
.stat-n{font-size:28px;font-weight:900;color:var(--accent);font-family:var(--mono);line-height:1}
.stat-l{font-size:11px;font-weight:700;color:var(--text-3);margin-top:5px;text-transform:uppercase;letter-spacing:.05em}
.section{margin-bottom:28px}
.section-title{font-size:14px;font-weight:900;color:var(--text);margin-bottom:14px}
.boards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.board-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;transition:.15s;text-decoration:none;display:block;color:inherit}
.board-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 24px rgba(200,230,50,.1)}
.bc-thumb{height:90px;background:linear-gradient(135deg,rgba(200,230,50,.08),rgba(28,28,30,.1));display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.bc-body{padding:14px 16px}
.bc-teacher{font-size:11px;color:var(--text-3);margin-bottom:6px}
.bc-name{font-size:14px;font-weight:800;color:var(--text);margin-bottom:10px}
.bc-bar{height:5px;border-radius:3px;background:rgba(94,94,74,.1);overflow:hidden;margin-bottom:6px}
.bc-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#C8E632,#1C1C1E)}
.bc-pct{font-size:11px;color:var(--text-3);font-family:var(--mono)}
.quiz-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;background:var(--card);border:1px solid var(--border);margin-bottom:10px}
.quiz-score{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;flex-shrink:0}
.quiz-info{flex:1}
.quiz-board{font-size:11px;color:var(--text-3);margin-bottom:2px}
.quiz-title{font-size:14px;font-weight:700;color:var(--text)}
.quiz-date{font-size:11px;color:var(--text-3);margin-top:2px}
.vocab-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.vocab-word{font-size:14px;font-weight:800;color:var(--text);min-width:120px}
.vocab-trans{font-size:13px;color:var(--accent);flex:1}
.vocab-badge{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:20px;background:rgba(110,201,138,.12);color:#6ec98a}
.vocab-badge.new{background:rgba(200,230,50,.1);color:var(--accent)}
.teacher-note{background:rgba(200,230,50,.05);border:1.5px solid rgba(200,230,50,.15);border-radius:14px;padding:16px 18px;margin-bottom:24px}
.teacher-note-label{font-size:10px;font-weight:700;color:var(--accent);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.teacher-note-text{font-size:14px;color:var(--text-2);line-height:1.65;white-space:pre-wrap}
.note-edit-area{width:100%;padding:10px 12px;border:1.5px solid rgba(200,230,50,.2);border-radius:10px;font-family:var(--font);font-size:13px;outline:none;resize:vertical;background:#fff;color:var(--text);min-height:80px;margin-top:8px}
.save-btn{margin-top:8px;padding:7px 18px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-family:var(--font);font-size:12px;font-weight:800;cursor:pointer;transition:.15s}
.save-btn:hover{opacity:.88}
.empty{text-align:center;padding:28px;color:var(--text-3);font-size:13px;border:1.5px dashed var(--border);border-radius:14px}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:9999}
.spinner{width:32px;height:32px;border-radius:50%;border:3px solid rgba(200,230,50,.2);border-top-color:var(--accent);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading.hidden{display:none}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:.25s;z-index:9999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){.stats-row{grid-template-columns:1fr 1fr}#main{padding:16px 14px 40px}}
</style>
<link rel="stylesheet" href="styles/harmony.css">
</head>
<body>

<div id="loading">
  <div style="font-size:2rem">🎓</div>
  <div class="spinner"></div>
  <div style="font-size:13px;font-weight:700;color:var(--text-3)">Loading portal…</div>
</div>
<div id="toast"></div>

<nav id="nav">
  <a class="nav-logo" href="index.html">Teached<em>OS</em></a>
  <div class="nav-spacer"></div>
  <span id="nav-role" style="font-size:11px;font-weight:800;font-family:var(--mono);padding:2px 10px;border-radius:20px;background:rgba(200,230,50,.1);color:var(--accent);text-transform:uppercase;letter-spacing:.06em;"></span>
  <a class="nav-btn" href="javascript:history.back()">← Back</a>
</nav>

<main id="main" style="display:none">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-avatar" id="p-avatar">🎓</div>
    <div>
      <div class="hero-name" id="p-name">—</div>
      <div class="hero-email" id="p-email">—</div>
    </div>
    <div class="hero-spacer"></div>
    <div style="text-align:center;background:rgba(200,230,50,.08);border-radius:14px;padding:14px 20px;border:1.5px solid rgba(200,230,50,.18)">
      <div style="font-size:28px;font-weight:900;color:var(--accent);font-family:var(--mono)" id="p-lessons">—</div>
      <div style="font-size:10px;font-weight:700;color:#c2410c;font-family:var(--mono);letter-spacing:.07em;text-transform:uppercase;margin-top:3px">lessons left</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat"><div class="stat-n" id="s-boards">—</div><div class="stat-l">Boards</div></div>
    <div class="stat"><div class="stat-n" id="s-done">—</div><div class="stat-l">Done</div></div>
    <div class="stat"><div class="stat-n" id="s-vocab">—</div><div class="stat-l">Vocab</div></div>
    <div class="stat"><div class="stat-n" id="s-quiz">—</div><div class="stat-l">Quiz avg</div></div>
  </div>

  <!-- Teacher note (teacher view only) -->
  <div id="teacher-note-section" style="display:none">
    <div class="teacher-note">
      <div class="teacher-note-label">📝 Teacher note</div>
      <div class="teacher-note-text" id="note-text"></div>
      <textarea class="note-edit-area" id="note-edit" placeholder="Add a note about this student…"></textarea>
      <button class="save-btn" onclick="saveNote()">Save note</button>
    </div>
  </div>

  <!-- Boards -->
  <div class="section">
    <div class="section-title">📋 Enrolled Boards</div>
    <div class="boards-grid" id="boards-grid">
      <div class="empty">No boards yet</div>
    </div>
  </div>

  <!-- Vocab -->
  <div class="section" id="vocab-section" style="display:none">
    <div class="section-title">📖 Vocabulary <span style="font-size:11px;font-weight:600;color:var(--text-3);font-family:var(--mono)" id="vocab-count"></span></div>
    <div id="vocab-list"></div>
  </div>

  <!-- Quiz history -->
  <div class="section" id="quiz-section" style="display:none">
    <div class="section-title">📝 Quiz History</div>
    <div id="quiz-list"></div>
  </div>

</main>

<script>
const API = 'https://teachedos-api.onrender.com';
const token = localStorage.getItem('teachedos_token');
let isTeacherView = false;

function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }

let toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2500);
}

function apiFetch(path, opts={}){
  return fetch(API+path,{
    ...opts,
    headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{}),...(opts.headers||{})},
    body:opts.body?JSON.stringify(opts.body):undefined
  });
}

async function init(){
  if(!token){ location.href='index.html'; return; }

  const params = new URLSearchParams(location.search);
  let studentId = params.get('id');

  const meRes = await apiFetch('/api/auth/me');
  if(!meRes.ok){ location.href='index.html'; return; }
  const { user: me } = await meRes.json();

  if(!studentId) studentId = me.id;
  isTeacherView = (me.role==='teacher'||me.role==='admin') && String(me.id)!==String(studentId);
  document.getElementById('nav-role').textContent = isTeacherView ? '🧑‍🏫 Teacher view' : '🎓 My portal';

  try {
    const r = await apiFetch('/api/student/portal/'+studentId);
    if(!r.ok){ renderError(); }
    else {
      const data = await r.json();
      render(data, studentId);
    }
  } catch(e){ console.error(e); renderError(); }

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('main').style.display='';
}

function render(d, studentId){
  const { student, boards, vocab, quizHistory, stats, teacherNotes } = d;

  document.getElementById('p-avatar').textContent = student.avatar||'🎓';
  document.getElementById('p-name').textContent = student.name;
  document.getElementById('p-email').textContent = student.email;
  document.getElementById('p-lessons').textContent = stats.lessonsLeft||'—';
  document.getElementById('s-boards').textContent = stats.boards;
  document.getElementById('s-done').textContent = stats.done;
  document.getElementById('s-vocab').textContent = stats.vocabLearned+'/'+stats.vocabTotal;
  document.getElementById('s-quiz').textContent = stats.quizAvg ? stats.quizAvg+'%' : '—';

  // Teacher note
  if(isTeacherView){
    const ns = document.getElementById('teacher-note-section');
    ns.style.display='';
    ns.dataset.studentId = studentId;
    if(teacherNotes){
      document.getElementById('note-text').textContent = teacherNotes;
      document.getElementById('note-edit').value = teacherNotes;
    }
  }

  // Boards
  const grid = document.getElementById('boards-grid');
  if(boards.length){
    grid.innerHTML = boards.map(b=>{
      const pct=b.pct||0;
      return '<a class="board-card" href="board.html?id='+b.id+'">'
        +'<div class="bc-thumb">'+(b.thumbnail?'<img src="'+esc(b.thumbnail)+'" style="width:100%;height:100%;object-fit:cover">':'📋')+'</div>'
        +'<div class="bc-body">'
        +'<div class="bc-teacher">🧑‍�� '+esc(b.teacher_name||'Teacher')+'</div>'
        +'<div class="bc-name">'+esc(b.name)+'</div>'
        +'<div class="bc-bar"><div class="bc-fill" style="width:'+pct+'%"></div></div>'
        +'<div class="bc-pct">'+b.done_lessons+'/'+b.total_lessons+' done · '+pct+'%</div>'
        +'</div></a>';
    }).join('');
  }

  // Vocab
  if(vocab&&vocab.length){
    document.getElementById('vocab-section').style.display='';
    document.getElementById('vocab-count').textContent='('+vocab.length+' words)';
    document.getElementById('vocab-list').innerHTML=vocab.slice(0,30).map(v=>
      '<div class="vocab-item">'
      +'<div class="vocab-word">'+esc(v.word)+'</div>'
      +'<div class="vocab-trans">'+esc(v.translation||'')+'</div>'
      +'<span class="vocab-badge'+(v.learned?'':' new')+'">'+(v.learned?'learned':'new')+'</span>'
      +'</div>'
    ).join('');
  }

  // Quiz history
  if(quizHistory&&quizHistory.length){
    document.getElementById('quiz-section').style.display='';
    document.getElementById('quiz-list').innerHTML=quizHistory.map(q=>{
      const pct=q.pct||0;
      const bg=pct>=80?'rgba(34,197,94,.15)':pct>=50?'rgba(234,179,8,.15)':'rgba(239,68,68,.15)';
      const col=pct>=80?'#16a34a':pct>=50?'#ca8a04':'#dc2626';
      const date=new Date(q.submitted_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
      return '<div class="quiz-item">'
        +'<div class="quiz-score" style="background:'+bg+';color:'+col+'">'+pct+'%</div>'
        +'<div class="quiz-info">'
        +'<div class="quiz-board">📋 '+esc(q.board_name||q.board_id)+'</div>'
        +'<div class="quiz-title">'+q.score+'/'+q.max_score+' points</div>'
        +'<div class="quiz-date">'+date+'</div>'
        +'</div></div>';
    }).join('');
  }
}

function renderError(){
  document.getElementById('main').innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--text-3)"><div style="font-size:3rem;margin-bottom:16px">🔒</div><div style="font-size:16px;font-weight:700;color:var(--text-2)">No access</div><div style="margin-top:8px;font-size:13px">You do not have permission to view this portal.</div><a href="index.html" style="display:inline-block;margin-top:20px;padding:10px 24px;background:var(--accent);color:#fff;border-radius:10px;text-decoration:none;font-weight:800">Go home</a></div>';
}

async function saveNote(){
  const ns=document.getElementById('teacher-note-section');
  const studentId=ns.dataset.studentId;
  const note=document.getElementById('note-edit').value.trim();
  try{
    const r=await apiFetch('/api/student/portal/'+studentId+'/note',{method:'PATCH',body:{note}});
    if(r.ok){ document.getElementById('note-text').textContent=note; toast('✓ Note saved'); }
    else toast('Failed to save');
  }catch{ toast('Error saving note'); }
}

init();
</script>
</body>
</html>
