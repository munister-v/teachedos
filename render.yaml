databases:
  - name: teachedos-db
    databaseName: teachedos
    user: teachedos_user
    plan: free
    region: oregon
    ipAllowList: []

services:
  - type: web
    name: teachedos-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://munister-v.github.io,https://munister.com.ua
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: teachedos-db
          property: connectionString
