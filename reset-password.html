<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password · TeachEd</title>
<link rel="icon" href="favicon.ico">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100dvh;display:grid;place-items:center;background:#f5f4f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;padding:24px}
.card{background:#fff;border-radius:22px;padding:36px 40px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.08)}
.logo{font-size:24px;font-weight:900;letter-spacing:-.04em;margin-bottom:24px}
h1{font-size:20px;font-weight:800;margin-bottom:8px}
.sub{color:#666;font-size:14px;line-height:1.55;margin-bottom:24px}
input{width:100%;padding:13px 16px;border:1.5px solid rgba(0,0,0,.12);border-radius:13px;font-size:15px;font-weight:600;color:#1c1c1e;outline:none;margin-bottom:12px;transition:border-color .18s,box-shadow .18s}
input:focus{border-color:#C8E64A;box-shadow:0 0 0 3px rgba(200,230,74,.18)}
.btn{width:100%;padding:14px;background:#C8E64A;color:#151515;border:0;border-radius:13px;font-size:15px;font-weight:900;cursor:pointer;transition:opacity .18s}
.btn:disabled{opacity:.5;cursor:default}
.err{color:#d73333;font-size:13px;margin-bottom:12px;display:none}
.ok{color:#179955;font-size:14px;font-weight:700;line-height:1.5;margin-bottom:16px;display:none}
.back{display:block;text-align:center;margin-top:16px;font-size:13px;color:#888;text-decoration:none}
.back:hover{color:#333}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.15);border-top-color:#333;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">TeachEd 🍋</div>
  <div id="loading">
    <p class="sub"><span class="spinner"></span> Checking your link…</p>
  </div>
  <div id="form-section" style="display:none">
    <h1>Set new password</h1>
    <p class="sub" id="email-sub">Enter a new password for your account.</p>
    <div class="err" id="err"></div>
    <div class="ok"  id="ok"></div>
    <input id="pass"  type="password" placeholder="New password (min 8 chars)" autocomplete="new-password">
    <input id="pass2" type="password" placeholder="Confirm new password" autocomplete="new-password">
    <button class="btn" id="btn" onclick="submit()">Set new password</button>
    <a href="/" class="back">← Back to sign in</a>
  </div>
  <div id="invalid-section" style="display:none">
    <h1>Link expired</h1>
    <p class="sub" id="invalid-msg">This reset link is invalid or has already been used.</p>
    <a href="/" class="back" style="display:block;text-align:center;margin-top:16px;background:#C8E64A;color:#151515;padding:13px;border-radius:13px;font-weight:900;text-decoration:none;">Back to sign in</a>
  </div>
</div>

<script>
const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:4000' : '';

const params = new URLSearchParams(location.search);
const TOKEN  = params.get('token') || '';

async function init() {
  if (!TOKEN) { showInvalid('No token in URL.'); return; }
  try {
    const r = await fetch(API + '/api/auth/reset-password?token=' + encodeURIComponent(TOKEN));
    const d = await r.json();
    if (!d.valid) { showInvalid(d.error || 'Invalid link.'); return; }
    document.getElementById('email-sub').textContent =
      'Set a new password for ' + d.email;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('form-section').style.display = 'block';
  } catch {
    showInvalid('Could not verify the link. Please try again.');
  }
}

function showInvalid(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('invalid-msg').textContent = msg;
  document.getElementById('invalid-section').style.display = 'block';
}

async function submit() {
  const pass  = document.getElementById('pass').value;
  const pass2 = document.getElementById('pass2').value;
  const err   = document.getElementById('err');
  const ok    = document.getElementById('ok');
  const btn   = document.getElementById('btn');

  err.style.display = 'none';
  ok.style.display  = 'none';

  if (pass.length < 8) { err.textContent = 'Password must be at least 8 characters.'; err.style.display='block'; return; }
  if (pass !== pass2)  { err.textContent = 'Passwords do not match.'; err.style.display='block'; return; }

  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const r = await fetch(API + '/api/auth/reset-password', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ token: TOKEN, password: pass }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Error');
    ok.textContent  = '✓ Password updated! Redirecting to sign in…';
    ok.style.display = 'block';
    document.getElementById('pass').style.display  = 'none';
    document.getElementById('pass2').style.display = 'none';
    btn.style.display = 'none';
    setTimeout(() => { location.href = '/'; }, 2000);
  } catch (e) {
    err.textContent = e.message; err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Set new password';
  }
}

document.querySelectorAll('input').forEach(i =>
  i.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); }));

init();
</script>
</body>
</html>
