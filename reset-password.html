<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password · TeachEd</title>
<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="styles/auth.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
  .state-section { display: none; }
  .state-section.visible { display: block; }
</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <!-- Header -->
    <div class="auth-head">
      <img class="auth-logo" src="logo-sm.png" alt="TeachEd">
      <div class="auth-title">Teach<em>Ed</em></div>
    </div>

    <!-- Loading state -->
    <div id="section-loading" class="state-section visible">
      <div class="auth-spinner-wrap">
        <div class="auth-spinner"></div>
        Checking your reset link…
      </div>
    </div>

    <!-- Set new password form -->
    <div id="section-form" class="state-section">
      <div class="auth-sub" style="margin-bottom:20px;font-size:14px;font-weight:600;color:var(--auth-ink2);">
        Set a new password for <strong id="email-display" style="color:var(--auth-ink)"></strong>
      </div>
      <div class="auth-err" id="err"></div>
      <div class="auth-ok"  id="ok"></div>

      <div class="auth-field-wrap has-toggle">
        <input class="auth-inp" id="pass" type="password" placeholder="New password (min 8 chars)" autocomplete="new-password">
        <button type="button" class="auth-eye" onclick="toggleEye('pass', this)" aria-label="Show password">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle class="eye-open" cx="12" cy="12" r="3"/>
            <line class="eye-closed" x1="1" y1="1" x2="23" y2="23" style="display:none"/>
            <path class="eye-closed" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" style="display:none"/>
          </svg>
        </button>
      </div>

      <div class="auth-field-wrap has-toggle">
        <input class="auth-inp" id="pass2" type="password" placeholder="Confirm new password" autocomplete="new-password">
        <button type="button" class="auth-eye" onclick="toggleEye('pass2', this)" aria-label="Show confirm password">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle class="eye-open" cx="12" cy="12" r="3"/>
            <line class="eye-closed" x1="1" y1="1" x2="23" y2="23" style="display:none"/>
            <path class="eye-closed" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" style="display:none"/>
          </svg>
        </button>
      </div>

      <button class="auth-btn" id="btn" type="button" onclick="submit()">
        <span class="auth-btn-spinner"></span>
        <span class="auth-btn-lbl">Set new password</span>
      </button>
      <a href="/" class="auth-back">← Back to sign in</a>
    </div>

    <!-- Invalid / expired link -->
    <div id="section-invalid" class="state-section">
      <div style="text-align:center;padding:8px 0 20px;">
        <div style="font-size:2.5rem;margin-bottom:12px;">🔗</div>
        <div style="font-size:17px;font-weight:800;color:var(--auth-ink);margin-bottom:8px;">Link expired</div>
        <div class="auth-sub" id="invalid-msg" style="font-size:13px;line-height:1.55;">This reset link is invalid or has already been used.</div>
      </div>
      <a href="/" class="auth-btn" style="text-decoration:none;display:flex;">Back to sign in</a>
    </div>

  </div>
</div>

<script>
const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:4000' : '';

const params = new URLSearchParams(location.search);
const TOKEN  = params.get('token') || '';

function showSection(id) {
  document.querySelectorAll('.state-section').forEach(s => s.classList.remove('visible'));
  document.getElementById(id).classList.add('visible');
}

function showInvalid(msg) {
  document.getElementById('invalid-msg').textContent = msg;
  showSection('section-invalid');
}

function toggleEye(inputId, btn) {
  const inp = document.getElementById(inputId);
  const showing = inp.type === 'text';
  inp.type = showing ? 'password' : 'text';
  btn.querySelectorAll('.eye-open').forEach(el => el.style.display = showing ? '' : 'none');
  btn.querySelectorAll('.eye-closed').forEach(el => el.style.display = showing ? 'none' : '');
  btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
}

async function init() {
  if (!TOKEN) { showInvalid('No reset token found in URL.'); return; }
  try {
    const r = await fetch(API + '/api/auth/reset-password?token=' + encodeURIComponent(TOKEN));
    const d = await r.json();
    if (!d.valid) { showInvalid(d.error || 'This link is invalid or expired.'); return; }
    document.getElementById('email-display').textContent = d.email;
    showSection('section-form');
    document.getElementById('pass').focus();
  } catch {
    showInvalid('Could not verify the link. Please try again.');
  }
}

async function submit() {
  const pass  = document.getElementById('pass').value;
  const pass2 = document.getElementById('pass2').value;
  const err   = document.getElementById('err');
  const ok    = document.getElementById('ok');
  const btn   = document.getElementById('btn');

  err.style.display = 'none';
  ok.style.display  = 'none';

  if (pass.length < 8) { err.textContent = 'Password must be at least 8 characters.'; err.style.display = 'block'; document.getElementById('pass').focus(); return; }
  if (pass !== pass2)  { err.textContent = 'Passwords do not match.'; err.style.display = 'block'; document.getElementById('pass2').focus(); return; }

  btn.classList.add('loading');
  btn.disabled = true;
  try {
    const r = await fetch(API + '/api/auth/reset-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN, password: pass }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Something went wrong');
    ok.textContent  = '✓ Password updated! Redirecting to sign in…';
    ok.style.display = 'block';
    document.getElementById('pass').closest('.auth-field-wrap').style.display = 'none';
    document.getElementById('pass2').closest('.auth-field-wrap').style.display = 'none';
    btn.style.display = 'none';
    setTimeout(() => { location.href = '/'; }, 2000);
  } catch (e) {
    err.textContent = e.message; err.style.display = 'block';
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

document.querySelectorAll('.auth-inp').forEach(i =>
  i.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); }));

init();
</script>
</body>
</html>
